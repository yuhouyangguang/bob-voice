services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bob-voice-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DATABASE_URL=sqlite:////data/bob_voice.db
      - STORAGE_DIR=/data/storage
    volumes:
      - bob-data:/data
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: bob-voice-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  bob-data:
    driver: local
